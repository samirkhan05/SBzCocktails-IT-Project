<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json"
 

    <!-- update the version number as needed -->
    <script defer src="/__/firebase/12.12.0/firebase-app-compat.js"></script>
    <!-- include only the Firebase features as you need -->
    <script defer src="/__/firebase/12.12.0/firebase-auth-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-database-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-firestore-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-functions-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-messaging-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-storage-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-analytics-compat.js"></script>
    <script defer src="/__/firebase/12.12.0/firebase-remote-config-compat.js"></script>


    <script defer src="/__/firebase/init.js?useEmulator=true"></script>

    <style>
      html, body {
            margin: 0;
            padding: 0;
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background-color: white;
            border-bottom: 2px solid #f0f0f0;
            flex-grow: 0; 
        }

        .logo {
            width: 100px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        nav a {
            text-decoration: none;
            color: black;
            margin: 0 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .auth button {
            margin-left: 10px;
            padding: 8px 16px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 5px;
        }

        main {
            flex-grow: 1; 
            position: relative; 
        }

        .herosection {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .herovid {
            width: 100%;
            height: 100%;
            display: block;
        }

        .herocontainer {
            position: absolute; 
            top: 50%; 
            left: 40px; 
            color: white;
        }

        .hero1 {
            font-size: 36px; 
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hero2 {
            font-size: 18px;
            margin: 5px 0 0 0;
            font-style: italic;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        footer {
            flex-grow: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px; 
            background-color: #222;
            color: white;
            font-size: 14px;
        }
    </style>

    </head>

  <body>

    <header>
        <div class="logo">Logo</div>
        
        <nav>
            <a href="">Home</a>
            <a href="">Items</a>
            <a href="">Favorites</a>
        </nav>

        <div class="auth">
            <button>Login</button>
            <button>Sign up</button>
        </div>
    </header>

    <main>
        <div class="herosection">
            <video autoplay loop muted playsinline class = "herovid"><source src"" type = "video"></video>
            <div class="herocontainer">
                <h1 class="hero1">SIP, RELAX,</h1><h1 class="hero1">REPEAT</h1>
                <p class="hero2">Crafted for your taste</p>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 Cocktails</p>
    </footer>
  

    <script>
      document.addEventListener('DOMContentLoaded', function() {
        const loadEl = document.querySelector('#load');
        try {
          let app = firebase.app();
          let features = [
            'auth', 
            'database', 
            'firestore',
            'functions',
            'messaging', 
            'storage', 
            'analytics', 
            'remoteConfig',
          ].filter(feature => typeof app[feature] === 'function');
          loadEl.textContent = `Firebase SDK loaded with ${features.join(', ')}`;
        } catch (e) {
          console.error(e);
          loadEl.textContent = 'Error loading the Firebase SDK, check the console.';
        }
      });

      //put code below the firebase things.
    </script>
  </body>
</html>
