<!DOCTYPE html>
<html>
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="manifest" href="manifest.json">
 
<script src="/__/firebase/12.12.0/firebase-app-compat.js"></script>
<script src="/__/firebase/12.12.0/firebase-auth-compat.js"></script>
<script src="/__/firebase/12.12.0/firebase-firestore-compat.js"></script>
<script src="/__/firebase/init.js"></script>

    <title>Home</title>
    <link rel="icon" href="sb_logo_2.png" type="image/x-icon">

    <style>
        * {
            box-sizing:  border-box;
        }

      html, body {
            margin: 0;
            padding: 0;
            height: 100%; 
            width: 100%;
            overflow: hidden; 
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background-color: #4c0e00;
            border-bottom: 1.5px solid #1e0000;
            flex-grow: 0; 
        }

        .logo img {
            height: 50px;
            width: 50px;
            margin: 0;
            padding: 0;
            border-radius: 10px;
        }

        nav a {
            text-decoration: none;
            color: white;
            margin: 0 15px;
            font-size: 16px;
            font-weight: 500;
        }

        .auth a {
            margin-left: 10px;
            padding: 10px 18px;
            color: white;
            border: none;
            border-radius: 5px;
            border: 1px solid #ffffff;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.1s ease-in-out 0s;
        }

        .auth a:hover {
            border: 1px solid #4c0e00;
            color: #4c0e00;
            background: #ffffff;
        }

        main {
            flex-grow: 1; 
            position: relative; 
            margin: 0;
        }

        .herosection {
            width: 100%;
            height: 100%;
            position: relative;
        }

        .iframe {
            position: relative;
            width: 100%;
            height: 100%;
        }

        .iframe-end {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
        }

        .herovid {
            width: 100%;
            height: 100%;
            display: block;
        }

        .herocontainer {
            position: absolute; 
            top: 50%; 
            left: 40px; 
            color: white;
        }

        .hero1 {
            font-size: 42px; 
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hero2 {
            font-size: 16px;
            margin: 5px 0 0 0;
            color: #e3e3e3;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        footer {
            flex-grow: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 20px; 
            background-color: #222;
            color: #e3e3e3;
            font-size: 14px;
            padding: 15px;
        }
    </style>

    </head>

  <body>

    <header>
        <a href="index.html" class="logo">
            <img src="sb_logo_2.png" alt="Logo">
        </a>
        
        <nav>
            <a href="index.html">Home</a>
            <a href="item.html">Items</a>
            <a href="favorite.html">Favorites</a>
        </nav>

        
        <div class="auth">
            <a href="log-in.html">Log In</a>
            <a href="sign-up.html">Sign Up</a>
        </div>
    </header>

    <main>
        <div class="herosection">
            <div class="iframe">
                <iframe width="100%" height="100%" src="https://www.youtube.com/embed/yVAQqUq3iU0?si=jjByjkxpieiufEuK&autoplay=1&mute=1&controls=0&modestbranding=1&rel=0&showinfo=0&loop=1&playlist=yVAQqUq3iU0&disablekb=1&iv_load_policy=3" title="YouTube video player" frameborder="0" allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture; web-share" referrerpolicy="strict-origin-when-cross-origin" allowfullscreen></iframe>
                <div class="iframe-end"></div>
            </div>
            <div class="herocontainer">
                <h1 class="hero1">SIP, RELAX,</h1><h1 class="hero1">REPEAT.</h1>
                <p class="hero2">Crafted for your taste</p>
            </div>
        </div>
    </main>

    <footer>
        <p>© 2026 SB Cocktails | All Rights Reserved</p>
    </footer>
  

<script>
  document.addEventListener('DOMContentLoaded', function () {

        // Hide auth buttons until Firebase confirms state
    const authDiv = document.querySelector('.auth');
    authDiv.style.visibility = 'hidden';

    firebase.auth().onAuthStateChanged(function (user) {

      if (user) {
        authDiv.innerHTML = `
          <a href="favorite.html">Favorites</a>
          <a href="#" id="logoutBtn">Log Out</a>
        `;
        document.getElementById('logoutBtn').addEventListener('click', function (e) {
          e.preventDefault();
          firebase.auth().signOut().then(() => {
            window.location.href = 'index.html';
          });
        });
      } else {
        authDiv.innerHTML = `
          <a href="log-in.html">Log In</a>
          <a href="sign-up.html">Sign Up</a>
        `;
      }

      // Show auth buttons only after Firebase has confirmed state
      authDiv.style.visibility = 'visible';
    });
  });
</script>
  </body>
</html>
