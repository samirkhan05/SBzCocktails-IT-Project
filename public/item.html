<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script defer src="/__/firebase/12.12.0/firebase-app-compat.js"></script>
<script defer src="/__/firebase/12.12.0/firebase-auth-compat.js"></script>
<script defer src="/__/firebase/init.js"></script>
    <title>Items</title>
    <style>

        * {
            box-sizing:  border-box;
        }

      html, body {
            margin: 0;
            padding: 0;
            height: 100%; 
            width: 100%;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background-color: #4c0e00;
            border-bottom: 1.5px solid #1e0000;
            flex-grow: 0; 
        }

        .logo img {
            height: 50px;
            width: 50px;
            margin: 0;
            padding: 0;
            border-radius: 10px;
        }

        nav a {
            text-decoration: none;
            color: white;
            margin: 0 15px;
            font-size: 16px;
            font-weight: 500;
        }

        .auth a {
            margin-left: 10px;
            padding: 10px 18px;
            color: white;
            border: none;
            border-radius: 5px;
            border: 1px solid #ffffff;
            text-decoration: none;
            cursor: pointer;
            transition: all 0.1s ease-in-out 0s;
        }

        .auth a:hover {
            border: 1px solid #4c0e00;
            color: #4c0e00;
            background: #ffffff;
        }

        main {
            flex-grow: 1; 
        }

        .herosection {
            width: 100%;
            height: 500px;
            position: relative;
            background-color: gray;
        }

        .hero-picture {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .herocontainer {
            position: absolute; 
            top: 50%; 
            left: 40px; 
            transform: translateY(-50%);
            color: white;
        }

        .hero1 {
            font-size: 36px; 
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hero2 {
            font-size: 18px;
            margin: 5px 0 0 0;
            font-style: italic;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .carousel {
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f9f9f9;
        }

        .carouselcontainer {
            display: flex;
            width: 90%;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            position: relative;
        }

        .carouselcards {
            display: flex;
            flex-direction: row;
            transition: transform 1s ease;
            
        }

        .card {
            min-width: 200px;
            height: 250px;
            margin: 10px;
            background-color: #ddd;
            border-radius: 10px;
        }

        .card img {
            width: 100%;
            height: 85%;
            object-fit: cover;
        }

        .card p {
            font-size: 18px;
            color:  black;
            text-align: center;
            margin: 0;
        }

        .carbtn {
            background: black;
            color: white;
            height: 30px;
            width: 30px;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }

        .filters {
            padding: 40px;
        }

        .filters h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .filtercols {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            margin-top: 20px;
        }

        .column {
            flex: 1;
            padding: 10px;
        }

        .column h3 {
            border-bottom: 2px solid black;
            padding-bottom: 5px;
        }

        .column ul {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .column li {
            padding: 5px 0;
            cursor: pointer;
        }

        .column li:hover {
            color: orange;
        }

        #results {
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            min-height: 200px;
            background-color: #eee;
        }

        footer {
            flex-shrink: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px; 
            background-color: #222;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="sb_logo_2.png" alt="Logo">
        </a>
        
        <nav>
            <a href="index.html">Home</a>
            <a href="item.html">Items</a>
            <a href="">Favorites</a>
        </nav>

        
        <div class="auth">
            <a href="log-in.html">Log In</a>
            <a href="sign-up.html">Sign Up</a>
        </div>
    </header>

    <main>
        <div class="herosection">
            <img src="item-hero-section.jpg" alt="Hero Image" class="hero-picture">
            <div class="herocontainer">
                <h1 class="hero1">Discover Your Drink</h1>
                <p class="hero2">Browse drinks from top bartenders</p><br>
                <input type="text" id="searchInput" placeholder="Search Cocktails" style="padding: 10px; width: 300px; border-radius: 5px; border: none;">
                <button onclick="searchCocktails()" style="padding: 10px 20px; margin-left: 8px; background: #4c0e00; color: white; border: none; border-radius: 5px; cursor: pointer;">Search</button>
            </div>
        </div>
            <br>
            
            <br>
        <section class="carousel">
            <h1>The People's Choices</h1>
            
            <div class="carouselcontainer">
                <button class="carbtn" id="prevBtn"> < </button>
                <div class="carouselcards" id="cards">
                    
                </div>
                <button class="carbtn" id="nextBtn"> > </button>
            </div>
        </section>

        <section class="filters">
            <h1>Add Filters</h1>
            <div class="filtercols">
                <div class="column">
                    <h3>Category</h3>
                    <ul id="catlist">

                    </ul>
                </div>
                <div class="column">
                    <h3>Alcohol</h3>
                    <ul id="alclist">

                    </ul>
                </div>
                <div class="column">
                    <h3>Glass</h3>
                    <ul id="glasslist">

                    </ul>
                </div>
            </div>
        </section>

        <section id="results">
            <p>Select a filter to see cocktails...</p>
        </section>
    </main>

    <footer>
        <p>© 2026 SB Cocktails | All Rights Reserved</p>
    </footer>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        firebase.auth().onAuthStateChanged(function (user) {
            const authDiv = document.querySelector('.auth');
            if (user) {
                authDiv.innerHTML = `
                    <a href="favorites.html">Favorites</a>
                    <a href="#" id="logoutBtn">Log Out</a>
                `;
                document.getElementById('logoutBtn').addEventListener('click', function (e) {
                    e.preventDefault();
                    firebase.auth().signOut().then(() => {
                        window.location.href = 'index.html';
                    });
                });
            } else {
                authDiv.innerHTML = `
                    <a href="log-in.html">Log In</a>
                    <a href="sign-up.html">Sign Up</a>
                `;
            }
        });
    });

    let card = [];
    let startIndex = 0;

    // Carousel function
    async function getRandom() {
        try {
            for (let i = 0; i < 32; i++) {
                let response = await fetch('https://www.thecocktaildb.com/api/json/v1/1/random.php');
                let data = await response.json();
                card.push(data.drinks[0]);
            }
            renderCarousel(card);
        } catch (error) {
            console.log(error);
        }
    }

    function renderCarousel(carouselCard) {
        let carCard = document.querySelector('#cards');
        let html = '';
        for (let i = startIndex; i < startIndex + 4; i++) {
            html += `
                <div class="card">
                    <img src="${carouselCard[i].strDrinkThumb}" alt="Carousel Card">
                    <p>${carouselCard[i].strDrink}</p>
                </div>
            `;
        }
        carCard.innerHTML = html;
    }

    getRandom();

    document.querySelector('#prevBtn').addEventListener('click', () => {
        if (startIndex > 0) {
            startIndex--;
            renderCarousel(card);
        }
    });

    document.querySelector('#nextBtn').addEventListener('click', () => {
        if (startIndex + 4 < card.length) {
            startIndex++;
            renderCarousel(card);
        }
    });

    // Categories function 
    async function getCategories() {
        try {
            let response = await fetch('https://www.thecocktaildb.com/api/json/v1/1/list.php?c=list');
            let data = await response.json();
            renderCategories(data.drinks);
        } catch (error) {
            console.log(error);
        }
    }

    function renderCategories(data) {
        let catList = document.querySelector('#catlist');
        let html = '';
        for (let d of data) {
            html += `<li onclick="filterBy('c', '${d.strCategory}')">${d.strCategory}</li>`;
        }
        catList.innerHTML = html;
    }

    // Alcohol typo fixed, was previously "Alchohol"
    async function getAlcohol() {
        try {
            let response = await fetch('https://www.thecocktaildb.com/api/json/v1/1/list.php?a=list');
            let data = await response.json();
            renderAlcohol(data.drinks);
        } catch (error) {
            console.log(error);
        }
    }

    function renderAlcohol(data) {
        let alcList = document.querySelector('#alclist');
        let html = '';
        for (let d of data) {
            html += `<li onclick="filterBy('a', '${d.strAlcoholic}')">${d.strAlcoholic}</li>`;
        }
        alcList.innerHTML = html;
    }

    // Glass filter now added
    async function getGlass() {
        try {
            let response = await fetch('https://www.thecocktaildb.com/api/json/v1/1/list.php?g=list');
            let data = await response.json();
            renderGlass(data.drinks);
        } catch (error) {
            console.log(error);
        }
    }

    function renderGlass(data) {
        let glassList = document.querySelector('#glasslist');
        let html = '';
        for (let d of data) {
            html += `<li onclick="filterBy('g', '${d.strGlass}')">${d.strGlass}</li>`;
        }
        glassList.innerHTML = html;
    }

    // Filter results
    async function filterBy(type, value) {
        try {
            let response = await fetch(`https://www.thecocktaildb.com/api/json/v1/1/filter.php?${type}=${encodeURIComponent(value)}`);
            let data = await response.json();
            renderResults(data.drinks);
        } catch (error) {
            console.log(error);
        }
    }
    // Search function added to search for cocktails, uses render results
async function searchCocktails() {
    const query = document.getElementById('searchInput').value.trim();

    if (!query) return;

    try {
        let response = await fetch(`https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${encodeURIComponent(query)}`);
        let data = await response.json();
        renderResults(data.drinks);

        // Scroll down to results so user can see them
        document.querySelector('#results').scrollIntoView({ behavior: 'smooth' });
    } catch (error) {
        console.log(error);
    }
}

// Also added trigger functionality when user presses Enter
document.getElementById('searchInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        searchCocktails();
    }
});

    function renderResults(drinks) {
        let results = document.querySelector('#results');
        if (!drinks) {
            results.innerHTML = '<p>No cocktails found.</p>';
            return;
        }
        let html = '';
        for (let d of drinks) {
            html += `
                <div class="card">
                    <img src="${d.strDrinkThumb}" alt="${d.strDrink}">
                    <p>${d.strDrink}</p>
                </div>
            `;
        }
        results.innerHTML = html;
    }

    getCategories();
    getAlcohol();
    getGlass();
</script>
</body>
</html>
