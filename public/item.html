<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
<script defer src="/__/firebase/12.12.0/firebase-app-compat.js"></script>
<script defer src="/__/firebase/12.12.0/firebase-auth-compat.js"></script>
<script defer src="/__/firebase/12.12.0/firebase-firestore-compat.js"></script> 
<script defer src="/__/firebase/init.js"></script>
    <title>Items</title>
    <link rel="icon" href="sb_logo_2.png" type="image/x-icon">

    <style>

        * {
            box-sizing:  border-box;
        }

      html, body {
            margin: 0;
            padding: 0;
            height: 100%; 
            width: 100%;
            font-family: 'Times New Roman', Times, serif;
            display: flex;
            flex-direction: column;
        }

        /* Header CSS */
        header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background-color: #4c0e00;
            border-bottom: 1.5px solid #1e0000;
            flex-grow: 0; 
        }

        .logo img {
            height: 50px;
            width: 50px;
            margin: 0;
            padding: 0;
            border-radius: 10px;
        }

        nav a {
            text-decoration: none;
            color: white;
            margin: 0 15px;
            font-size: 16px;
            font-weight: 500;
        }

        .auth a {
            margin-left: 10px;
            padding: 10px 18px;
            color: white;
            border: none;
            border-radius: 5px;
            border: 1px solid #ffffff;
            text-decoration: none;
            visibility: visible;
            cursor: pointer;
            transition: all 0.1s ease-in-out 0s;
        }

        .auth a:hover {
            border: 1px solid #4c0e00;
            color: #4c0e00;
            background: #ffffff;
        }

        /* Hero Section CSS */

        .herosection {
            width: 100%;
            height: 500px;
            position: relative;
            background-color: gray;
        }

        .hero-picture {
            width: 100%;
            height: 100%;
            object-fit: cover;
        }

        .herocontainer {
            position: absolute; 
            top: 50%; 
            left: 40px; 
            transform: translateY(-50%);
            color: white;
        }

        .hero1 {
            font-size: 36px; 
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hero2 {
            font-size: 18px;
            margin: 5px 0 0 0;
            font-style: italic;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        /* Carousel CSS */

        .carousel {
            padding: 50px;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            background-color: #f9f9f9;
        }

        .carouselcontainer {
            display: flex;
            width: 90%;
            align-items: center;
            justify-content: center;
            overflow: hidden; 
            position: relative;
        }

        .carouselcards {
            display: flex;
            flex-direction: row;
            transition: transform 1s ease;
            
        }

        .card {
            min-width: 200px;
            height: 280px;
            margin: 10px;
            background-color: #ddd;
            border-radius: 10px;
            overflow: hidden;     
            flex-shrink: 0;       
        }

        .card img {
            width: 100%;
            height: 75%;
            object-fit: cover;
        }

        .card p {
            font-size: 18px;
            color:  black;
            text-align: center;
            margin: 0;
        }
         .fav-btn {
            width: 100%;
            background: #4c0e00;
            color: white;
            border: none;
            padding: 6px;
            cursor: pointer;
            font-size: 13px;
            border-radius: 0 0 10px 10px;
        }

        .fav-btn:hover {
            background: #7a1a00;
        }

        .carbtn {
            background: black;
            color: white;
            height: 30px;
            width: 30px;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }

        /* Filters CSS */

        .filters {
            padding: 40px;
        }

        .filters h1 {
            text-align: center;
            margin-bottom: 30px;
        }

        .filtercols {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            margin-top: 20px;
        }

        .column {
            flex: 1;
            padding: 10px;
        }

        .column h3 {
            border-bottom: 2px solid black;
            padding-bottom: 5px;
        }

        .column ul {
            list-style: none;
            padding: 0;
            max-height: 200px;
            overflow-y: auto;
        }

        .column li {
            padding: 5px 0;
            cursor: pointer;
        }

        .column li:hover {
            color: orange;
        }

        .drinks-grid {
            margin: 20px;
            display: grid;
            grid-template-columns: repeat(3, 1fr);
            column-gap: 10px;
            row-gap: 10px;
            background-color: #eee;
            padding: 20px;
        }

        /* Drinks Card CSS - Ingredients */
        .drink-item {
            display: flex;
            flex-direction: column;
            background: rgba(237, 225, 215, 0.726);
            border-radius: 5px;
            overflow: hidden;
        }

        .drink-item img {
            width: 100%;
            height: 200px;
            object-fit: cover;
            border-radius: 5px;
        }

        .drink-detail {
            display: flex;
            flex-direction: column;
            flex-grow: 1;
            padding-bottom: 8px;
        }

        .drink-detail p {
            padding: 0 8px;
        }

        .name {
            font-size: 17px;
            font-weight: 600;
            margin: 8px 0;
        }

        .description {
            font-size: 12px;
            color: gray;
            margin: 4px 0;
        }

        .instruction-header {
            margin: 5px 0;
            font-size: 12px;
            font-weight: 600;
            padding: 0 8px;
        }

        .instruction {
            margin: 0;
            font-size: 13px;
            line-height: 1.5;
            padding: 0 8px;
        }

        #ingredients-view table,
        #instructions-vew table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }

        table {
            width: 100%;
            border-collapse: collapse;
            margin: 0;
        }

        table th {
            font-size: 12px;
            text-align: left;
            padding: 4px 8px;
        }

        table tr {
            display: flex;
            justify-content: space-between;
            width: 100%;
            border-bottom: 0.5px solid black;
            font-size: 12px;
            padding: 3px 8px;
        }

        table thead tr {
            border-bottom: 1px solid black;
        }

        .buttons {
            display: flex;
            justify-content: space-around;
            margin-top: auto;
            padding: 8px 8px;
            width: 100%;
        }

        .buttons button {
            border: none;
            background: rgb(209, 49, 84);
            color: white;
            padding: 6px 12px;
            border-radius: 3px;
            cursor: pointer;
            font-size: 12px;
        }

        .buttons button:hover {
            background: rgba(209, 49, 84, 0.9);
        }

        footer {
            flex-shrink: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px; 
            background-color: #222;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <a href="index.html" class="logo">
            <img src="sb_logo_2.png" alt="Logo">
        </a>
        
        <nav>
            <a href="index.html">Home</a>
            <a href="item.html">Items</a>
            <a href="favorite.html">Favorites</a>
        </nav>

        
        <div class="auth">
            <a href="log-in.html">Log In</a>
            <a href="sign-up.html">Sign Up</a>
        </div>
    </header>

    <main>
        <div class="herosection">
            <img src="item-hero-section.jpg" alt="Hero Image" class="hero-picture">
            <div class="herocontainer">
                <h1 class="hero1">Discover Your Drink</h1>
                <p class="hero2">Browse drinks from top bartenders</p><br>
                <input type="text" id="searchInput" placeholder="Search Cocktails" style="padding: 10px; width: 300px; border-radius: 5px; border: none;">
                <button onclick="searchCocktails()" style="padding: 10px 20px; margin-left: 8px; background: #4c0e00; color: white; border: none; border-radius: 5px; cursor: pointer;">Search</button>
            </div>
        </div>
            <br>
            
            <br>
        <section class="carousel">
            <h1>The People's Choices</h1>
            
            <div class="carouselcontainer">
                <button class="carbtn" id="prevBtn"> < </button>
                <div class="carouselcards" id="cards">
                    
                </div>
                <button class="carbtn" id="nextBtn"> > </button>
            </div>
        </section>

        <section class="filters">
            <h1>Add Filters</h1>
            <div class="filtercols">
                <div class="column">
                    <h3>Category</h3>
                    <ul id="catlist">
                        
                    </ul>
                </div>
                <div class="column">
                    <h3>Alcohol</h3>
                    <ul id="alclist">

                    </ul>
                </div>
                <div class="column">
                    <h3>Glass</h3>
                    <ul id="glasslist">

                    </ul>
                </div>
            </div>
        </section>

        <section class="drinks-grid" id="results">
            <p>Select a filter to see cocktails...</p>
        </section>
    </main>

    <footer>
        <p>© 2026 SB Cocktails | All Rights Reserved</p>
    </footer>

<script>
    document.addEventListener('DOMContentLoaded', function () {
        const authDiv = document.querySelector('.auth');
        authDiv.style.visibility = 'hidden';

        firebase.auth().onAuthStateChanged(function (user) {
            if (user) {
                authDiv.innerHTML = `
                    <a href="favorite.html">Favorites</a>
                    <a href="#" id="logoutBtn">Log Out</a>
                `;
                document.getElementById('logoutBtn').addEventListener('click', function (e) {
                    e.preventDefault();
                    firebase.auth().signOut().then(() => {
                        window.location.href = 'index.html';
                    });
                });
            } else {
                authDiv.innerHTML = `
                    <a href="log-in.html">Log In</a>
                    <a href="sign-up.html">Sign Up</a>
                `;
            }
         authDiv.style.visibility = 'visible'; 
     });
    });

    let card = [];
    let startIndex = 0;

    // Carousel function
    async function getRandom() {
        try {
            for (let i = 0; i < 32; i++) {
                let response = await fetch('https://www.thecocktaildb.com/api/json/v1/1/random.php');
                let data = await response.json();
                card.push(data.drinks[0]);
            }
            renderCarousel(card);
        } catch (error) {
            console.log(error);
        }
    }

    function renderCarousel(carouselCard) {
        let carCard = document.querySelector('#cards');
        let html = '';
        for (let i = startIndex; i < startIndex + 4; i++) {
            html += `
                <div class="card">
                    <img src="${carouselCard[i].strDrinkThumb}" alt="Carousel Card">
                    <p>${carouselCard[i].strDrink}</p>
                </div>
            `;
        }
        carCard.innerHTML = html;
    }

    getRandom();

    document.querySelector('#prevBtn').addEventListener('click', () => {
        if (startIndex > 0) {
            startIndex--;
            renderCarousel(card);
        }
    });

    document.querySelector('#nextBtn').addEventListener('click', () => {
        if (startIndex + 4 < card.length) {
            startIndex++;
            renderCarousel(card);
        }
    });

    // Categories function 
    async function getCategories() {
        try {
            let response = await fetch('https://www.thecocktaildb.com/api/json/v1/1/list.php?c=list');
            let data = await response.json();
            renderCategories(data.drinks);
        } catch (error) {
            console.log(error);
        }
    }

    function renderCategories(data) {
        let catList = document.querySelector('#catlist');
        let html = '';
        for (let d of data) {
            html += `<li onclick="filterBy('c', '${d.strCategory}')">${d.strCategory}</li>`;
        }
        catList.innerHTML = html;
    }

    // Alcohol typo fixed, was previously "Alchohol"
    async function getAlcohol() {
        try {
            let response = await fetch('https://www.thecocktaildb.com/api/json/v1/1/list.php?a=list');
            let data = await response.json();
            renderAlcohol(data.drinks);
        } catch (error) {
            console.log(error);
        }
    }

    function renderAlcohol(data) {
        let alcList = document.querySelector('#alclist');
        let html = '';
        for (let d of data) {
            html += `<li onclick="filterBy('a', '${d.strAlcoholic}')">${d.strAlcoholic}</li>`;
        }
        alcList.innerHTML = html;
    }

    // Glass filter now added
    async function getGlass() {
        try {
            let response = await fetch('https://www.thecocktaildb.com/api/json/v1/1/list.php?g=list');
            let data = await response.json();
            renderGlass(data.drinks);
        } catch (error) {
            console.log(error);
        }
    }

    function renderGlass(data) {
        let glassList = document.querySelector('#glasslist');
        let html = '';
        for (let d of data) {
            html += `<li onclick="filterBy('g', '${d.strGlass}')">${d.strGlass}</li>`;
        }
        glassList.innerHTML = html;
    }

    // Filter results
    async function filterBy(type, value) {
        try {
            let response = await fetch(`https://www.thecocktaildb.com/api/json/v1/1/filter.php?${type}=${encodeURIComponent(value)}`);
            let data = await response.json();

            if (!data.drinks) {
                document.querySelector('#results').innerHTML = '<p>No cocktails found.</p>';
                return;
            }

            // Fetch full details for each drink (filter endpoint only gives id/name/thumb)
            const detailPromises = data.drinks.map(d =>
                fetch(`https://www.thecocktaildb.com/api/json/v1/1/lookup.php?i=${d.idDrink}`)
                    .then(r => r.json())
                    .then(r => r.drinks[0])
            );
            const fullDrinks = await Promise.all(detailPromises);

            // const fullDrinks = [];
            // for (let drink of data.drinks) {
            //     const detailResponse = await fetch(`https://www.thecocktaildb.com/api/json/v1/1/lookup.php?i=${drink.idDrink}`);
            //     const detailData = await detailResponse.json();
            //     fullDrinks.push(detailData.drinks[0]);
            // }

            renderResults(fullDrinks);

        } catch (error) {
            console.log(error);
        }
    }

    // Search function added to search for cocktails, uses render results
async function searchCocktails() {
    const query = document.getElementById('searchInput').value.trim();

    if (!query) return;

    try {
        let response = await fetch(`https://www.thecocktaildb.com/api/json/v1/1/search.php?s=${encodeURIComponent(query)}`);
        let data = await response.json();
        renderResults(data.drinks);

        // Scroll down to results so user can see them
        document.querySelector('#results').scrollIntoView({ behavior: 'smooth' });
    } catch (error) {
        console.log(error);
    }
}

// Also added trigger functionality when user presses Enter
document.getElementById('searchInput').addEventListener('keypress', function (e) {
    if (e.key === 'Enter') {
        searchCocktails();
    }
});

//Get ingredients for each drink to add to card
function getIngredients(drink) {
    let ingredients = [];
    for (let i = 1; i <= 15; i++) {
        const ing = drink[`strIngredient${i}`];
        const measure = drink[`strMeasure${i}`];
        if (ing && ing !== '' && ing !== ' ') {
            const ingredient = measure ? measure + ' ' + ing : ing;
            ingredients.push(ingredient);
        }
    }
    return ingredients;
}

// Render drinks-grid when searching for a drink
function renderResults(drinks) {
    let results = document.querySelector('#results');
    if (!drinks) {
        results.innerHTML = '<p>No cocktails found.</p>';
        return;
    }

    let html = '';
    for (let drink of drinks) {

        const safeId = drink.idDrink;
        const safeName = drink.strDrink.replace(/'/g, "\\'");
        const instructions = drink.strInstructions || 'No instructions available.';

        // Build ingredients list first
        const ingredients = [];

        for (let i = 1; i <= 15; i++) {
            const ingredient = drink[`strIngredient${i}`];
            const measure = drink[`strMeasure${i}`];
            if (ingredient && ingredient !== '' && ingredient !== ' ') {
                let measureValue;
                if (measure) {
                    measureValue = measure;
                } else {
                    measureValue = '-';
                }
                ingredients.push({ name: ingredient, measure: measureValue });
            }
        }

        // Build table rows from ingredients list
        let rows = '';
        for (let ingredient of ingredients) {
            rows += `
                <tr>
                    <td>${ingredient.name}</td>
                    <td>${ingredient.measure}</td>
                </tr>
            `;
        }

        // Build entire card
        html += `
            <div class="drink-item">
                <img src="${drink.strDrinkThumb}" alt="${drink.strDrink}">

                <div class="drink-detail">
                    <p class="name">${drink.strDrink}</p>
                    <p class="description">
                        ${drink.strCategory} | ${drink.strAlcoholic} | ${drink.strGlass}
                    </p>

                    <div id="ingredients-${safeId}">
                        <table>
                            <thead>
                                <tr>
                                    <th>Ingredients (${ingredients.length})</th>
                                    <th>Measure</th>
                                </tr>
                            </thead>
                            <tbody>
                                ${rows}
                            </tbody>
                        </table>
                    </div>

                    <div id="instructions-${safeId}" style="display:none;">
                        <p class="instruction-header">Instructions</p>
                        <p class="instruction">${instructions}</p>
                    </div>

                    <div class="buttons">
                        <button onclick="addToFavorites('${safeId}', '${safeName}', '${drink.strDrinkThumb}')">
                            ♥ Save To Favorites
                        </button>
                        <button onclick="showDetails('${safeId}', this)">
                            Show Details
                        </button>
                    </div>
                </div>
            </div>
        `;
    }

    results.innerHTML = html;
}

// Toggle between ingredients and details
function showDetails(id, btn) {
    const ingredientsDiv = document.getElementById(`ingredients-${id}`);
    const instructionsDiv = document.getElementById(`instructions-${id}`);

    if (ingredientsDiv.style.display !== 'none') {
        ingredientsDiv.style.display = 'none';
        instructionsDiv.style.display = 'block';
        btn.textContent = 'Show Ingredients';
    } else {
        ingredientsDiv.style.display = 'block';
        instructionsDiv.style.display = 'none';
        btn.textContent = 'Show Details';
    }
}

 async function addToFavorites(id, name, thumb) {
        const user = firebase.auth().currentUser;

        if (!user) {
            alert('Please log in to save favorites.');
            window.location.href = 'log-in.html';
            return;
        }

        try {
            const db = firebase.firestore();

            // Check if already favorited
            const existing = await db.collection('favourites')
                .where('uid', '==', user.uid)
                .where('cocktailId', '==', id)
                .get();

            if (!existing.empty) {
                alert('Already in your favorites!');
                return;
            }

            await db.collection('favourites').add({
                uid: user.uid,
                cocktailId: id,
                cocktailName: name,
                cocktailThumb: thumb,
                savedAt: firebase.firestore.FieldValue.serverTimestamp()
            });

            alert(`${name} added to favorites!`);
        } catch (error) {
            console.log(error);
            alert('Error saving favorite.');
        }
    }
    
    if ('serviceWorker' in navigator) {
      navigator.serviceWorker.register('/sw.js');
    }

    getCategories();
    getAlcohol();
    getGlass();
</script>
</body>
</html>
