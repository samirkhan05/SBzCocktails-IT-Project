<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Items</title>
    <style>
        html, body {
            margin: 0;
            padding: 0;
            height: 100%; 
            width: 100%;
            overflow-y: auto;
            font-family: sans-serif;
            display: flex;
            flex-direction: column;
        }

        header {
            display: flex;
            flex-direction: row;
            justify-content: space-between;
            align-items: center;
            padding: 10px 30px;
            background-color: white;
            border-bottom: 2px solid #f0f0f0;
            flex-shrink: 0; 
        }

        .logo {
            width: 100px;
            height: 50px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: bold;
        }

        nav a {
            text-decoration: none;
            color: black;
            margin: 0 15px;
            font-size: 16px;
            font-weight: bold;
        }

        .auth button {
            margin-left: 10px;
            padding: 8px 16px;
            background-color: black;
            color: white;
            border: none;
            border-radius: 5px;
        }

        main {
            flex-grow: 1; 
        }

        .herosection {
            width: 100%;
            height: 400px;
            position: relative;
            background-color: gray;
        }

        .herovideo {
            width: 100%;
            height: 100%;
            object-fit: cover;
            display: block;
        }

        .herocontainer {
            position: absolute; 
            top: 50%; 
            left: 40px; 
            transform: translateY(-50%);
            color: white;
        }

        .hero1 {
            font-size: 36px; 
            font-weight: bold;
            margin: 0;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.8);
        }

        .hero2 {
            font-size: 18px;
            margin: 5px 0 0 0;
            font-style: italic;
            text-shadow: 1px 1px 3px rgba(0,0,0,0.8);
        }

        .carousel {
            padding: 40px;
            display: flex;
            align-items: center;
            justify-content: center;
            background-color: #f9f9f9;
        }

        .carouselcontainer {
            width: 80%;
            overflow: hidden; 
            position: relative;
        }

        .carouselcards {
            display: flex;
            flex-direction: row;
            transition: transform 0.5s ease;
        }

        .card {
            min-width: 200px;
            height: 250px;
            margin: 10px;
            background-color: #ddd;
            border-radius: 10px;
        }

        .carbtn {
            background: black;
            color: white;
            border: none;
            padding: 10px;
            cursor: pointer;
            border-radius: 50%;
        }

        .filters {
            padding: 40px;
        }

        .filters h2 {
            text-align: center;
            margin-bottom: 30px;
        }

        .filtercols {
            display: flex;
            flex-direction: row;
            justify-content: space-around;
            margin-top: 20px;
        }

        .column {
            flex: 1;
            padding: 10px;
        }

        .column h3 {
            border-bottom: 2px solid black;
            padding-bottom: 5px;
        }

        .column ul {
            list-style: none;
            padding: 0;
        }

        .column li {
            padding: 5px 0;
            cursor: pointer;
        }

        .column li:hover {
            color: orange;
        }

        #results {
            padding: 40px;
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            min-height: 200px;
            background-color: #eee;
        }

        footer {
            flex-shrink: 0; 
            display: flex;
            justify-content: center;
            align-items: center;
            height: 50px; 
            background-color: #222;
            color: white;
            font-size: 14px;
        }
    </style>
</head>
<body>

    <header>
        <div class="logo">Logo</div>
        <nav>
            <a href="index.html">Home</a>
            <a href="item.html">Items</a>
            <a href="">Favorites</a>
        </nav>
        <div class="auth">
            <button>Login</button>
            <button>Sign up</button>
        </div>
    </header>

    <main>
        <div class="herosection">
            <img src="https://images.unsplash.com/photo-1504674900247-0877df9cc836?auto=format&fit=crop&w=800&q=60" alt="Hero Image" class="herovideo">
            <div class="herocontainer">
                <h1 class="hero1">Discover Your Drink</h1>
                <p class="hero2">Browse drinks from top bartenders</p><br>
                <input type="text" placeholder="Search Cocktails" style="padding: 10px; width: 300px; border-radius: 5px; border: none;">
            </div>
        </div>
            <br>
            
            <br>
        <section class="carousel">
            <h1>The People's Choices</h1>
            <button class="carbtn" id="prevBtn"> < </button>
            <div class="carouselcontainer">
                <div class="carouselcards" id="cards">
                    <div class="card"></div>
                    <div class="card"></div>
                    <div class="card"></div>
                    <div class="card"></div>
                </div>
            </div>
            <button class="carbtn" id="nextBtn"> > </button>
        </section>

        <section class="filters">
            <h2>Add Filters</h2>
            <div class="filtercols">
                <div class="column">
                    <h3>Category</h3>
                    <ul id="catlist">
                        <li>Category</li>
                    </ul>
                </div>
                <div class="column">
                    <h3>Alcohol</h3>
                    <ul id="alclist">
                        <li>Alcohol</li>
                    </ul>
                </div>
                <div class="column">
                    <h3>Glass</h3>
                    <ul id="glasslist">
                        <li>Glass</li>
                    </ul>
                </div>
            </div>
        </section>

        <section id="results">
            <p>Select a filter to see cocktails...</p>
        </section>
    </main>

    <footer>
        <p>© 2026 Cocktails</p>
    </footer>

    <script>
        
    </script>
</body>
</html>
